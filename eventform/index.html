<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Ticket</title>

    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <h1>Event Ticket</h1>

    <form id="ticketForm">

        <div class="row">

            <div class="field">
                <label for="firstName">First Name</label>
                <input
                    type="text"
                    id="firstName"
                    required
                >
            </div>

            <div class="field">
                <label for="lastName">Last Name</label>
                <input
                    type="text"
                    id="lastName"
                    required
                >
            </div>

        </div>

        <div class="field">

            <label for="email">Email</label>

            <input
                type="email"
                id="email"
                required
            >

        </div>

        <div class="row">

            <div class="field">

                <label for="type">Type</label>

                <select id="type" required>

                    <option value="">Choose one</option>

                    <option value="student">Student</option>

                    <option value="guest">Guest</option>

                </select>

            </div>

            <div class="field">

                <label for="eventDate">Event Date</label>

                <input
                    type="date"
                    id="eventDate"
                    required
                >

            </div>

        </div>

        <!-- Hidden Student/Guest Field -->

        <div
            class="field hidden"
            id="extraField"
        >

            <label id="extraLabel">
                Student I#
            </label>

            <input
                type="text"
                id="extraInput"
            >

        </div>

        <button type="submit">
            Create Ticket
        </button>

    </form>

    <div id="errors"></div>

    <div id="ticketOutput"></div>

</div>

<script src="script.js"></script>

</body>
</html>
